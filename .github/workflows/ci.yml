name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Biome (lint + format)
        run: pnpm lint:ci

      - name: TypeScript typecheck
        run: pnpm tsc --noEmit

      - name: Lint RTL utilities (bash gate)
        run: bash scripts/lint-rtl.sh

      - name: Lint force-dynamic (bash gate)
        run: bash scripts/lint-force-dynamic.sh

      - name: Lint Arabic wrapper (soft warn)
        run: bash scripts/lint-arabic-wrapper.sh

      - name: Vitest invariants + unit tests
        run: pnpm test:run

      - name: Next build (exercises migration manifest reachability)
        run: pnpm build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers + deps
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Playwright E2E (4 projects)
        run: pnpm e2e
        env:
          # Playwright auto-starts `pnpm dev` per webServer in playwright.config.ts
          # when PLAYWRIGHT_BASE_URL is unset. To run against a deployed URL,
          # set this env var to the live origin (e.g. the Vercel preview URL).
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
